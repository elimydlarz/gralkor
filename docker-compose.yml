services:
  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - ${FALKORDB_DATA_DIR:-falkordb_data}:/var/lib/falkordb/data
    networks:
      - gralkor

  graphiti:
    build: ./server
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      FALKORDB_URI: redis://falkordb:6379
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      - falkordb
    networks:
      - gralkor

networks:
  gralkor:
    name: gralkor

volumes:
  falkordb_data:
